name: 'Docker Build and Push to ACR'
description: 'Construye una imagen Docker y la publica en Azure Container Registry'

inputs:
  acr-name:
    description: 'Nombre del ACR (sin .azurecr.io)'
    required: true
  image-name:
    description: 'Nombre de la imagen'
    required: true
  image-tag:
    description: 'Tag de la imagen'
    required: false
    default: ${{ github.sha }}

outputs:
  image:
    description: 'Imagen completa con tag'
    value: ${{ steps.meta.outputs.image }}

runs:
  using: 'composite'
  steps:
    - name: Resolver nombre de imagen
      id: meta
      shell: bash
      run: |
        IMAGE="${{ inputs.acr-name }}.azurecr.io/${{ inputs.image-name }}:${{ inputs.image-tag }}"
        echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
        echo "Imagen a construir: $IMAGE"

    - name: Login a ACR
      shell: bash
      run: az acr login --name "${{ inputs.acr-name }}"

    - name: Build y Push
      shell: bash
      run: |
        docker build -t "${{ steps.meta.outputs.image }}" .
        docker push "${{ steps.meta.outputs.image }}"
